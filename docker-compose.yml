version: "3.9"

services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docutrust_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB_NAME=docutrust_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - USE_OLLAMA=${USE_OLLAMA:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DEBUG=false
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app  # live reload in dev — remove for prod
    networks:
      - docutrust_net

  # ---- MongoDB ----
  mongo:
    image: mongo:7.0
    container_name: docutrust_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - docutrust_net

  # ---- Frontend (Nginx) ----
  frontend:
    image: nginx:alpine
    container_name: docutrust_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - docutrust_net

  # ---- Ollama (optional local LLM) ----
  ollama:
    image: ollama/ollama:latest
    container_name: docutrust_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - docutrust_net
    profiles:
      - ollama  # Only starts when: docker-compose --profile ollama up

networks:
  docutrust_net:
    driver: bridge

volumes:
  mongo_data:
  ollama_data:
